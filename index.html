<body>

    <style>
        /* Simple styling for the redirection page */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }
        .redirect-container {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            max-width: 500px;
        }
        h1 { color: #333; margin-bottom: 20px; }
        p { color: #666; font-size: 1.1rem; line-height: 1.6; }
        .new-url { font-weight: bold; color: #d4a373; } /* Gold color to match art theme */
        
        .btn-redirect {
            display: inline-block;
            margin-top: 30px;
            padding: 15px 30px;
            background-color: #333;
            color: #fff;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: transform 0.2s, background-color 0.2s;
        }
        .btn-redirect:hover {
            background-color: #555;
            transform: scale(1.05);
        }
        .timer {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #999;
        }
    </style>

    <div class="redirect-container">
        <h1>We've Moved!</h1>
        <p>Arts & Lamps has a brand new home. You are being redirected to our new, improved shop at:</p>
        <p class="new-url">www.artsandlamps.com</p>
        
        <a href="https://www.artsandlamps.com" class="btn-redirect">Visit New Website</a>

        <p class="timer">You will be redirected automatically in <span id="seconds">0</span> seconds...</p>
    </div>

    <script>
        // Configuration
        const newSite = "https://www.artsandlamps.com";
        let seconds = 0;

        // Update the countdown timer
        const countdown = setInterval(() => {
            seconds--;
            document.getElementById('seconds').textContent = seconds;
            if (seconds <= 0) {
                clearInterval(countdown);
                window.location.href = newSite;
            }
        }, 1000);
    </script>

</body>
